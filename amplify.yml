version: 1
# Trigger rebuild to invalidate CloudFront cache (retry)
frontend:
  phases:
    preBuild:
      commands:
        - nvm use 20
        - node -v
        - npm ci --cache .npm --prefer-offline
    build:
      commands:
        - env | grep -e GEMINI_API_KEY -e AUDIT_RATE_LIMIT_SECRET -e STAFF_PASSWORD -e STAFF_MARKETING_PASSWORD -e STAFF_TOKEN_SECRET >> .env.production
        - npm run lint
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .next/cache/**/*
      - .npm/**/*
      - node_modules/**/*
