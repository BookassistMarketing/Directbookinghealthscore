<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Direct Booking Health Score</title>
  <script>
    // GitHub Pages SPA redirect hack
    // Encodes the path into a query param so index.html can restore it
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      '/?/' +
      l.pathname.slice(1).replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
